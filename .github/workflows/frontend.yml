name: Frontend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/web/**'
      - 'packages/**'

jobs:
  # Trabajo para pruebas y linting
  test-lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
      
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Instalar dependencias
        run: npm ci
      
      - name: Linting
        run: npm run lint
        
      - name: Ejecutar pruebas
        run: npm run test
        env:
          NODE_ENV: test
  
  # Trabajo para construcción y despliegue
  build-deploy:
    needs: test-lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
      
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Instalar dependencias
        run: npm ci
      
      - name: Construir aplicación
        run: npm run build
        env:
          VITE_API_URL: https://api.daylog.com/api
      
      # Despliegue de la aplicación
      - name: Desplegar aplicación
        run: echo "Implementar paso de despliegue sin Docker aquí"
        env:
          NODE_ENV: production
      